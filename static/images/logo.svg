<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C53D43"/>
      <stop offset="100%" style="stop-color:#A52F34"/>
    </linearGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="60" cy="60" r="56" fill="url(#bgGrad)"/>
  
  <!-- 太极图简化版 -->
  <g transform="translate(60, 60)">
    <!-- 外圈 -->
    <circle cx="0" cy="0" r="32" fill="none" stroke="#FDFBF7" stroke-width="3"/>
    
    <!-- 上半圆（白） -->
    <path d="M 0,-32 A 32,32 0 0,1 0,32 A 16,16 0 0,1 0,0 A 16,16 0 0,0 0,-32" fill="#FDFBF7"/>
    
    <!-- 下半圆（黑） -->
    <path d="M 0,32 A 32,32 0 0,1 0,-32 A 16,16 0 0,1 0,0 A 16,16 0 0,0 0,32" fill="#2D2D2D"/>
    
    <!-- 上方小圆（黑点） -->
    <circle cx="0" cy="-16" r="6" fill="#2D2D2D"/>
    
    <!-- 下方小圆（白点） -->
    <circle cx="0" cy="16" r="6" fill="#FDFBF7"/>
  </g>
</svg>