baseURL = 'https://syzx.space'
languageCode = 'zh-CN'
title = '实用哲学'
theme = 'PaperMod'

[params]
  author = '实用哲学'
  description = '儒释道经典智慧，哲学深度思考，传统文化传承'
  keywords = ['国学', '传统文化', '儒释道', '哲学', '智慧', '经典']
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false
  
  [params.assets]
    favicon = '/favicon.ico'
    favicon16x16 = '/favicon-16x16.png'
    favicon32x32 = '/favicon-32x32.png'
    apple_touch_icon = '/apple-touch-icon.png'
    
  [params.profileMode]
    enabled = true
    title = '实用哲学'
    subtitle = '传承千年智慧，启迪当代人生'
    imageUrl = '/images/logo.svg'
    imageWidth = 120
    imageHeight = 120
    
    [[params.profileMode.buttons]]
      name = '📖 经典解读'
      url = '/posts/'
    [[params.profileMode.buttons]]
      name = '☯️ 儒释道'
      url = '/wisdom/'
    [[params.profileMode.buttons]]
      name = '💭 哲学思考'
      url = '/philosophy/'
    [[params.profileMode.buttons]]
      name = '🎬 视频作品'
      url = '/videos/'
    [[params.profileMode.buttons]]
      name = '👤 关于我'
      url = '/about/'

  [[params.socialIcons]]
    name = 'wechat'
    url = 'https://mp.weixin.qq.com/mp/profile_ext?action=home&__biz=Mzk0NjQwNTU5Ng=='
  [[params.socialIcons]]
    name = 'douyin'
    url = 'https://www.douyin.com/user/MS4wLjABAAAA'
  [[params.socialIcons]]
    name = 'bilibili'
    url = 'https://space.bilibili.com/'
  [[params.socialIcons]]
    name = 'email'
    url = 'mailto:601522876@qq.com'

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

# 精简导航菜单
[menu]
  [[menu.main]]
    identifier = 'posts'
    name = '经典解读'
    url = '/posts/'
    weight = 10
  [[menu.main]]
    identifier = 'wisdom'
    name = '儒释道'
    url = '/wisdom/'
    weight = 20
  [[menu.main]]
    identifier = 'philosophy'
    name = '哲学思考'
    url = '/philosophy/'
    weight = 30
  [[menu.main]]
    identifier = 'videos'
    name = '视频'
    url = '/videos/'
    weight = 40
  [[menu.main]]
    identifier = 'about'
    name = '关于'
    url = '/about/'
    weight = 50

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  category = 'categories'
  tag = 'tags'
  series = 'series'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    hl_inline = false
    lineAnchors = ""
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
    noHl = false
    style = "monokai"
    tabWidth = 4

[markup.tableOfContents]
  endLevel = 3
  ordered = false
  startLevel = 2