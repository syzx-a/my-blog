{{- $posts := where site.RegularPages "Section" "posts" -}}
{{- $featured := first 5 $posts -}}

<div class="home-article-list">
{{- range $featured }}
  <a href="{{ .Permalink }}" class="home-article-item">
    <span class="article-date">{{ .Date.Format "2006-01-02" }}</span>
    <span class="article-title">{{ .Title }}</span>
  </a>
{{- end }}
</div>

<style>
.home-article-list {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  margin: 1rem 0 2rem;
}

.home-article-item {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.75rem 1rem;
  background: var(--bg-card, #fff);
  border: 1px solid var(--border, #e5e5e5);
  border-radius: 8px;
  text-decoration: none;
  transition: all 0.2s ease;
}

.home-article-item:hover {
  border-color: var(--primary, #C53D43);
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  transform: translateX(4px);
}

.article-date {
  font-size: 0.85rem;
  color: var(--text-muted, #999);
  min-width: 90px;
}

.article-title {
  color: var(--text-primary, #2D2D2D);
  font-weight: 500;
}

@media (max-width: 640px) {
  .home-article-item {
    flex-direction: column;
    align-items: flex-start;
    gap: 0.25rem;
  }
  
  .article-date {
    font-size: 0.75rem;
  }
}
</style>
